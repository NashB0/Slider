workflows:
  android-debug:
    name: Slider Android Debug
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Generar carpetas de plataforma
        script: flutter create --platforms=android .
      - name: Obtener paquetes
        script: flutter pub get
      - name: Construir APK debug
        script: flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
